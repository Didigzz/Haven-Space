# Auto Assign Configuration
# Documentation: https://github.com/marketplace/actions/auto-assign-action

addAssignees: false # Don't assign the PR author

addReviewers: true # Enable automatic reviewer assignment

reviewers:
  - Drakaniia # Your GitHub username - will be added as reviewer

numberOfReviewers: 1 # Number of reviewers to assign

filterLabels:
  exclude:
    - 'skip-review' # Skip auto-assign for PRs with this label
