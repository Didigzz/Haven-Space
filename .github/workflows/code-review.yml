name: AI Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint
        continue-on-error: true
        id: eslint

      - name: Check formatting
        run: bun run format:check
        continue-on-error: true
        id: prettier

      - name: Get PR files
        id: files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            client/**/*.js
            client/**/*.html
            client/**/*.css
            server/**/*.php

      - name: Count changes
        id: stats
        run: |
          echo "added=$(echo '${{ steps.files.outputs.added_files }}' | tr ',' '\n' | wc -l)" >> $GITHUB_OUTPUT
          echo "modified=$(echo '${{ steps.files.outputs.modified_files }}' | tr ',' '\n' | wc -l)" >> $GITHUB_OUTPUT
          echo "deleted=$(echo '${{ steps.files.outputs.deleted_files }}' | tr ',' '\n' | wc -l)" >> $GITHUB_OUTPUT

      - name: Generate review summary
        id: review
        run: |
          echo "## 🔍 Automated Code Review" > review.md
          echo "" >> review.md
          echo "### 📊 Summary" >> review.md
          echo "- **Files Added**: ${{ steps.stats.outputs.added }}" >> review.md
          echo "- **Files Modified**: ${{ steps.stats.outputs.modified }}" >> review.md
          echo "- **Files Deleted**: ${{ steps.stats.outputs.deleted }}" >> review.md
          echo "" >> review.md
          
          if [ "${{ steps.eslint.outcome }}" = "failure" ]; then
            echo "### ❌ ESLint Issues Found" >> review.md
            echo "Please fix ESLint errors before merging." >> review.md
            echo "" >> review.md
          else
            echo "### ✅ ESLint Check Passed" >> review.md
            echo "" >> review.md
          fi
          
          if [ "${{ steps.prettier.outcome }}" = "failure" ]; then
            echo "### ❌ Formatting Issues Found" >> review.md
            echo "Run \`bun run format\` to fix formatting issues." >> review.md
            echo "" >> review.md
          else
            echo "### ✅ Code Formatting Passed" >> review.md
            echo "" >> review.md
          fi

      - name: Post review comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.md', 'utf8');
            
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: review,
              event: 'COMMENT'
            });
